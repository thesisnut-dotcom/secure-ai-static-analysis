name: Security Scan
on: [push]
jobs:
scan:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v4
with:
python-version: '3.10'
- name: Run Scans
run: |
pip install bandit semgrep pylint
bandit -r .
semgrep --config=auto .
pylint vulnerable_app.py --exit-zero
